          <h3>${isRevote ? `재투표 현황 · ${Number(roomData.voteRound ?? 2)}차` : "투표 현황"}</h3>
          <p>${submittedCount}명 / ${players.length}명 투표 완료</p>
          <div class="progress-line"><div class="progress-fill" style="width:${players.length ? Math.round(submittedCount / players.length * 100) : 0}%"></div></div>
          <button class="btn full" data-action="publish-result" ${submittedCount === players.length ? "" : "disabled"}>${isRevote ? "재투표 결과 확인" : "투표 결과 확인"}</button>
        </div>
      </section>
    `);
  }

  const voted = Boolean(myVote?.targetUid);
  const selected = uiState.voteTarget ?? myVote?.targetUid ?? null;
  const canEdit = !allVotesDone;
  return pageFrame(`
    <section class="card">
      <div class="status-banner">
        <strong>${isRevote ? "🔁 동률 재투표" : "🗳️ 투표"}</strong>
        <span>${isRevote ? "동률자 중 한 명에게 다시 투표하세요." : "늑대인간이라고 생각하는 플레이어를 선택하세요."}</span>
      </div>
      ${renderMayorBanner()}
      ${renderRevealerAnnouncement()}
      ${isRevote && roomData?.revoteReason ? `<div class="action-box center"><strong>${escapeHtml(roomData.revoteReason)}</strong></div>` : ""}
      ${voted ? `
        <div class="action-box center">
          <div class="role-icon">✅</div>
          <h3>${allVotesDone ? "투표 종료" : "투표 완료"}</h3>
          <p><strong>${escapeHtml(playerName(myVote.targetUid))}</strong>에게 투표했습니다.</p>
          ${!allVotesDone ? "<p>아직 모든 투표가 끝나지 않아 아래에서 수정할 수 있습니다.</p>" : "<p>모든 플레이어가 투표를 마쳐 더 이상 수정할 수 없습니다.</p>"}
        </div>
      ` : ""}
      ${canEdit ? `
        ${renderPlayerOptions({ selected: selected ? [selected] : [], max: 1, actionName: "select-vote", candidates })}
        <div class="spacer"></div>
        <button class="btn danger full" data-action="cast-vote" ${selected ? "" : "disabled"}>${voted ? "투표 수정" : "투표 확정"}</button>
      ` : ""}
      <p class="center muted" style="margin-top:14px">${allVotesDone ? "방장이 결과를 확인할 때까지 기다려 주세요." : "모든 플레이어의 투표를 기다리고 있습니다."}</p>
    </section>
  `);
}

function renderTeamResults(result) {
  return `
    <div class="team-result">
      <div class="team-chip ${result.villageWin ? "win" : "lose"}">🏠 마을 팀 ${result.villageWin ? "승리" : "패배"}</div>
      <div class="team-chip ${result.wolfWin ? "win" : "lose"}">🐺 늑대 팀 ${result.wolfWin ? "승리" : "패배"}</div>
      <div class="team-chip ${result.tannerWin ? "win" : "lose"}">🧵 무두장이 ${result.tannerWin ? "단독 승리" : "패배"}</div>
    </div>
    ${result.outcomeReason ? `<div class="action-box center"><strong>${escapeHtml(result.outcomeReason)}</strong></div>` : ""}
  `;
}

function renderResults() {
  if (!publicResult) {
    return pageFrame('<section class="card center"><p>투표 결과를 불러오는 중입니다.</p></section>');
  }
  const eliminated = publicResult.eliminatedUids ?? [];
  return pageFrame(`
    <section class="card">
      <div class="status-banner">
        <strong>📊 최종 투표 결과</strong>
        <span>${eliminated.length ? "최다 득표자가 처형되었습니다. 승리팀은 카드 공개가 모두 끝난 뒤 발표됩니다." : "처형 대상이 없습니다. 승리팀은 카드 공개가 모두 끝난 뒤 발표됩니다."}</span>
      </div>
      ${renderMayorBanner()}
      ${renderRevealerAnnouncement()}
      ${publicResult.wasRevote ? `<div class="action-box center"><strong>🔁 ${Number(publicResult.voteRound ?? 2)}차 투표 끝에 결과가 확정되었습니다.</strong></div>` : ""}
      <div class="vote-table">
        ${sortedPlayers().map((player) => `
          <div class="vote-row ${eliminated.includes(player.uid) ? "eliminated" : ""}">
            <span>${escapeHtml(player.nickname)} ${eliminated.includes(player.uid) ? "💀" : ""}</span>
            <span class="vote-count">${publicResult.voteCounts?.[player.uid] ?? 0}표</span>
          </div>
        `).join("")}
      </div>
      <div class="action-box">
        <h3>누가 누구에게 투표했나요?</h3>
        ${(publicResult.votes ?? []).map((vote) => `<p>${escapeHtml(playerName(vote.voterUid))} → <strong>${escapeHtml(playerName(vote.targetUid))}</strong></p>`).join("")}
      </div>
      ${isHost() ? `
        <div class="host-panel">
          <button class="btn full" data-action="reveal-roles">카드 공개 시작</button>
        </div>
      ` : '<p class="center muted" style="margin-top:14px">방장이 카드 공개를 시작할 때까지 기다려 주세요.</p>'}
    </section>
  `);
}

function renderReveal() {
  if (!publicResult || !revealedResult) {
    return pageFrame('<section class="card center"><p>직업 정보를 불러오는 중입니다.</p></section>');
  }
  const eliminated = publicResult.eliminatedUids ?? [];
  const winners = revealedResult.winnerUids ?? [];
  const revealOrder = revealedResult.revealOrder ?? sortedPlayers().map((player) => player.uid);
  const legacyIndex = Math.min(Number(revealedResult.revealIndex ?? 0), revealOrder.length);
  const legacyRevealed = revealOrder.slice(0, legacyIndex);
  const revealedUids = Array.isArray(revealedResult.revealedUids) ? revealedResult.revealedUids : legacyRevealed;
  const revealedSet = new Set(revealedUids);
  const revealedCount = revealOrder.filter((uid) => revealedSet.has(uid)).length;
  const allRevealed = revealedCount >= revealOrder.length;
  return pageFrame(`
    <section class="card">
      <div class="status-banner">
        <strong>🎴 카드 공개</strong>
        <span>${allRevealed ? "모든 카드가 공개되었습니다. 이제 승리팀을 확인하세요." : `방장이 공개하고 싶은 카드를 눌러 공개합니다. ${revealedCount}명 / ${revealOrder.length}명 공개`}</span>
      </div>
      ${renderMayorBanner()}
      ${renderRevealerAnnouncement()}
      <div class="reveal-grid">
        ${revealOrder.map((uid) => getPlayer(uid)).filter(Boolean).map((player) => {
          const isRevealed = revealedSet.has(player.uid);
          const canRevealCard = isHost() && !isRevealed;
          const initial = roleInfo(revealedResult.initialRoles?.[player.uid]);
          const final = roleInfo(revealedResult.finalRoles?.[player.uid]);
          const changed = revealedResult.initialRoles?.[player.uid] !== revealedResult.finalRoles?.[player.uid];
          return `
            <div class="reveal-card ${isRevealed ? "is-revealed" : ""} ${canRevealCard ? "reveal-clickable" : ""}" ${canRevealCard ? `data-action="reveal-card" data-uid="${player.uid}" role="button" title="${escapeHtml(player.nickname)} 카드 공개"` : ""}>
              <div class="reveal-card-inner">
                <div class="reveal-face reveal-back">
                  <div class="card-symbol">🌙</div>
                  <strong>${escapeHtml(player.nickname)}${eliminated.includes(player.uid) ? " 💀" : ""}</strong>
                  <span>카드 뒷면</span>
                </div>
                <div class="reveal-face reveal-front ${eliminated.includes(player.uid) ? "eliminated" : ""}">
                  <div class="reveal-head">
                    <strong>${escapeHtml(player.nickname)} ${eliminated.includes(player.uid) ? "💀" : ""}</strong>
                    ${allRevealed && winners.includes(player.uid) ? '<span class="winner-mark">승리</span>' : ""}
                  </div>
                  <div class="big-role">${final.icon} ${final.name}</div>
                  <div class="role-change">
                    처음: <strong>${initial.icon} ${initial.name}</strong>
                    ${changed ? ` → 최종: <strong>${final.icon} ${final.name}</strong>` : ""}
                  </div>
                </div>
              </div>
            </div>
          `;
        }).join("")}
      </div>
      ${!allRevealed ? `
        <p class="reveal-lock-note">아직 승리팀은 공개되지 않았습니다.</p>
        ${isHost()
          ? '<p class="center muted" style="margin-top:14px">공개하고 싶은 플레이어의 카드 뒷면을 직접 눌러 주세요.</p>'
          : '<p class="center muted" style="margin-top:14px">방장이 카드를 선택해 공개할 때까지 기다려 주세요.</p>'}
      ` : `
        <div class="divider"></div>
        <h3>중앙 카드</h3>
        <div class="center-cards">
          ${(revealedResult.centerRoles ?? []).map((role, index) => {
            const info = roleInfo(role);
            return `<div class="center-card"><div class="mini-icon">${info.icon}</div><div class="mini-name">${index + 1}. ${info.name}</div></div>`;
          }).join("")}
        </div>
        <div class="divider"></div>
        ${renderTeamResults(publicResult)}
        ${isHost() ? `
          <div class="host-panel">
            <button class="btn success full" data-action="reset-lobby">같은 방에서 새 게임</button>
          </div>
        ` : '<p class="center muted" style="margin-top:14px">방장이 새 게임을 준비할 때까지 기다려 주세요.</p>'}
      `}
    </section>
  `);
}

function render() {
  if (!currentUser) return;
  if (!roomCode || !roomData) {
    appEl.innerHTML = renderLanding();
    return;
  }

  const renderers = {
    lobby: renderLobby,
    night: renderNight,
    discussion: renderDiscussion,
    voting: renderVoting,
    revote: renderVoting,
    results: renderResults,
    reveal: renderReveal,
  };
  const renderer = renderers[roomData.status] ?? renderLobby;
  const newestChatId = chatMessages.at(-1)?.id ?? null;
  const shouldScrollChat = newestChatId !== lastRenderedChatId;
  appEl.innerHTML = renderer();
  if (shouldScrollChat) {
    lastRenderedChatId = newestChatId;
    requestAnimationFrame(() => {
      const chatBox = document.querySelector("#chat-messages");
      if (chatBox) chatBox.scrollTop = chatBox.scrollHeight;
    });
  }
}

function toggleSelection(list, value, max) {
  if (list.includes(value)) return list.filter((item) => item !== value);
  if (max === 1) return [value];
  if (list.length >= max) return [...list.slice(1), value];
  return [...list, value];
}

async function safeRun(task) {
  try {
    await task();
  } catch (error) {
    showToast(formatError(error));
  }
}

appEl.addEventListener("submit", (event) => {
  if (event.target.id === "chat-form") {
    event.preventDefault();
    const formData = new FormData(event.target);
    const message = String(formData.get("message") ?? uiState.chatDraft);
    safeRun(() => sendChatMessage(message));
    return;
  }

  if (event.target.id !== "entry-form") return;
  event.preventDefault();
  const formData = new FormData(event.target);
  const mode = event.submitter?.value;
  const nickname = String(formData.get("nickname") ?? "");
  const code = String(formData.get("roomCode") ?? "");
  safeRun(async () => {
    event.submitter.disabled = true;
    if (mode === "create") await createRoom(nickname);
    if (mode === "join") await joinRoom(code, nickname);
  });
});

appEl.addEventListener("input", (event) => {
  if (event.target.id === "chat-input") {
    uiState.chatDraft = event.target.value.slice(0, 120);
  }
});

appEl.addEventListener("click", (event) => {
  const target = event.target.closest("[data-action]");
  if (!target) return;
  const action = target.dataset.action;

  if (action === "copy-code") {
    safeRun(async () => {
      await navigator.clipboard.writeText(roomCode);
      showToast(`방 코드 ${roomCode}를 복사했습니다.`);
    });
    return;
  }

  if (action === "wolf-hunt") {
    queueWolfHuntClick();
    return;
  }

  if (action === "change-role-count") {
    const role = target.dataset.role;
    const delta = Number(target.dataset.delta ?? 0);
    safeRun(() => changeRoleCount(role, delta));
    return;
  }

  if (action === "kick-player") {
    safeRun(() => kickPlayer(target.dataset.uid));
    return;
  }

  if (action === "show-role") {
    roleVisible = true;
    render();
    return;
  }
  if (action === "hide-role") {
    roleVisible = false;
    render();
    return;
  }

  if (action === "select-player") {
    const uid = target.dataset.uid;
    const max = Number(target.dataset.max ?? 1);
    uiState.selectedPlayers = toggleSelection(uiState.selectedPlayers, uid, max);
    render();
    return;
  }

  if (action === "select-center") {
    const index = Number(target.dataset.index);
    const max = Number(target.dataset.max ?? 1);
    uiState.selectedCenters = toggleSelection(uiState.selectedCenters, index, max);
    render();
    return;
  }

  if (action === "seer-mode") {
    uiState.seerMode = target.dataset.mode;
    uiState.selectedPlayers = [];
    uiState.selectedCenters = [];
    render();
    return;
  }

  if (action === "select-vote") {
    uiState.voteTarget = target.dataset.uid;
    render();
    return;
  }

  const asyncActions = {
    "leave-room": leaveRoom,
    "delete-room": deleteRoomCompletely,
    "start-game": startGame,
    "finish-role": () => submitAction("finish-role", {}),
    "start-voting": startVoting,
    "publish-result": publishVoteResult,
    "reveal-roles": revealRoles,
    "reveal-card": () => revealCard(target.dataset.uid),
    "reset-lobby": resetToLobby,
    "cast-vote": () => castVote(uiState.voteTarget),
    "submit-wolf": () => submitAction("wolf-center", { centerIndex: uiState.selectedCenters[0] }),
    "submit-seer": () => submitAction("seer-view", uiState.seerMode === "center"
      ? { mode: "center", centerIndices: uiState.selectedCenters }
      : { mode: "player", targetUid: uiState.selectedPlayers[0] }),
    "submit-robber": () => submitAction("robber-swap", { targetUid: uiState.selectedPlayers[0] }),
    "submit-witch-view": () => submitAction("witch-view", { centerIndex: uiState.selectedCenters[0] }),
    "submit-witch-swap": () => submitAction("witch-decide", { centerIndex: Number(target.dataset.index), swap: true }),
    "submit-witch-keep": () => submitAction("witch-decide", { centerIndex: Number(target.dataset.index), swap: false }),
    "submit-troublemaker": () => submitAction("troublemaker-swap", { targetUids: uiState.selectedPlayers }),
    "submit-drunk": () => submitAction("drunk-swap", { centerIndex: uiState.selectedCenters[0] }),
    "submit-doppel-copy": () => submitAction("doppel-copy", { targetUid: uiState.selectedPlayers[0] }),
    "submit-doppel-seer": () => submitAction("doppel-seer", uiState.seerMode === "center"
      ? { mode: "center", centerIndices: uiState.selectedCenters }
      : { mode: "player", targetUid: uiState.selectedPlayers[0] }),
    "submit-doppel-robber": () => submitAction("doppel-robber", { targetUid: uiState.selectedPlayers[0] }),
    "submit-doppel-troublemaker": () => submitAction("doppel-troublemaker", { targetUids: uiState.selectedPlayers }),
    "submit-doppel-minion": () => submitAction("doppel-minion", {}),
    "submit-doppel-drunk": () => submitAction("doppel-drunk", { centerIndex: uiState.selectedCenters[0] }),
    "submit-doppel-witch-swap": () => submitAction("doppel-witch", { centerIndex: uiState.selectedCenters[0], swap: true }),
    "submit-doppel-witch-keep": () => submitAction("doppel-witch", { centerIndex: uiState.selectedCenters[0], swap: false }),
    "submit-doppel-revealer": () => submitAction("doppel-revealer", { targetUid: uiState.selectedPlayers[0] }),
    "submit-revealer": () => submitAction("revealer-check", { targetUid: uiState.selectedPlayers[0] }),
  };

  if (asyncActions[action]) safeRun(asyncActions[action]);
});

  </script>
</body>
</html>
